<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="https://feeds.feedburner.com/{{site.feedburner.feed_address}}">

  {% assign galaxy_host = "https://galaxy.cloudbreak.app" %}
  {% assign site_domain = "https://benjaminoakes.com" %}

  {% if galaxy_host %}
    <script>
      (function() {
        var currentUrl = window.location.href;
        var currentReferrer = document.referrer;
        var cacheBuster = Math.random().toString(36).substring(2, 10);

        var verify = new Image();
        verify.src = "{{ galaxy_host }}/jekyll/verify" +
                     "?url=" + encodeURIComponent(currentUrl) +
                     "&referrer=" + encodeURIComponent(currentReferrer) +
                     "&plain=true" +
                     "&cb=" + cacheBuster;
      })();
    </script>

    <noscript>
      <img src="{{ galaxy_host }}/jekyll/verify?url={{ site_domain | append: page.url | url_encode }}&plain=true&noscript=true"
           width="1" height="1"
           style="display:none;"
           alt="" />
    </noscript>
  {% endif %}
</head>
